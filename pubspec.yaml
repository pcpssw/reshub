name: reshub
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter  
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0  
  http: ^1.2.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  fl_chart: ^1.1.1
  url_launcher: ^6.3.0
  carousel_slider: ^5.0.0
  docman: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/RHLogo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/RHLogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/RHLogo.png